<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>React App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: auto; }
    input, button { margin: 5px; padding: 6px; }
    .grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .card { border: 1px solid #ccc; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

function App() {
  const [q, setQ] = React.useState("");
  const [books, setBooks] = React.useState([]);

  const search = () => {
    fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}`)
      .then(res => res.json())
      .then(d => setBooks(d.items || []));
  };

  return (
    <div className="container">
      <h1>React Lab - Aaditya Timilsina (24BCE2967)</h1>
      <h2>Book Explorer</h2>
      <input placeholder="Search books" onChange={e => setQ(e.target.value)} />
      <button onClick={search}>Search</button>
      <div>
        {books.map((b, i) => (
          b.volumeInfo && (
            <div key={i} className="card">
              <p><b>{b.volumeInfo.title}</b></p>
              <p>{b.volumeInfo.authors?.[0]}</p>
              {b.volumeInfo.imageLinks && <img src={b.volumeInfo.imageLinks.thumbnail} />}
            </div>
          )
        ))}
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
