<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>React App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: auto; }
    input, button { margin: 5px; padding: 6px; }
    .grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .card { border: 1px solid #ccc; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

function App() {
  const [c, setC] = React.useState("");
  const [data, setData] = React.useState([]);

  const search = () => {
    fetch(`https://restcountries.com/v3.1/name/${c}`)
      .then(res => res.json())
      .then(d => setData(d));
  };

  return (
    <div className="container">
      <h1>React Lab - Aaditya Timilsina (24BCE2967)</h1>
      <h2>Country Explorer</h2>
      <input placeholder="Enter country" onChange={e => setC(e.target.value)} />
      <button onClick={search}>Search</button>
      <div>
        {data.map((d, i) => (
          <div key={i} className="card">
            <p><b>{d.name.common}</b></p>
            <p>Capital: {d.capital?.[0]}</p>
            <p>Population: {d.population}</p>
            <p>Region: {d.region}</p>
            <img src={d.flags.png} width="100" />
          </div>
        ))}
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
