<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>React App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: auto; }
    input, button { margin: 5px; padding: 6px; }
    .grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .card { border: 1px solid #ccc; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

function App() {
  const images = [
    "https://picsum.photos/id/1015/300/200",
    "https://picsum.photos/id/1016/300/200",
    "https://picsum.photos/id/1018/300/200"
  ];
  const [selected, setSelected] = React.useState(images[0]);

  return (
    <div className="container">
      <h1>React Lab - Aaditya Timilsina (24BCE2967)</h1>
      <h2>Image Gallery</h2>
      <img src={selected} width="300" />
      <div className="grid">
        {images.map((img, i) => (
          <img key={i} src={img} width="100" onClick={() => setSelected(img)} />
        ))}
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
