<input id="num" placeholder="Enter number">
<button onclick="run()">Run</button>

<p id="o"></p>

<script>
function run() {
    var num = parseInt(document.getElementById("num").value);

    if (isNaN(num)) {
        alert("Please enter a valid number");
        return;
    }

    var i = 1;
    var s = "";

    do {
        s += num + " x " + i + " = " + (num * i) + "<br>";
        i++;
    } while (i <= 10);

    document.getElementById("o").innerHTML = s;
}
</script>

</body>
</html>
